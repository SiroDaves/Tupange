name: tupange
description: A Slide Puzzle for Kenyans
publish_to: "none" #
version: 1.0.1

environment:
  sdk: ^3.6.0

dependencies:
  bloc: ^9.0.0
  card_swiper: ^3.0.1
  carousel_slider: ^5.0.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^10.8.0
  gallery_saver: ^2.3.2
  gap: ^3.0.1
  intl: ^0.19.0
  audioplayers: ^6.4.0
  path_provider: ^2.1.5
  universal_html: ^2.2.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/audio/
    - assets/icons/
    - assets/images/
    - assets/images/planets/

  fonts:
    - family: ComicSans
      fonts:
        - asset: assets/fonts/ComicSans.ttf
    - family: DS-Digital
      fonts:
        - asset: assets/fonts/DS-Digital.ttf
    - family: FreshMan
      fonts:
        - asset: assets/fonts/FreshMan.ttf